services:
  postgres:
    image: postgres:16-alpine
    container_name: powerguard-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-powerguard}
      POSTGRES_USER: ${POSTGRES_USER:-powerguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-powerguard}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-powerguard} -d ${POSTGRES_DB:-powerguard}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: powerguard-api
    environment:
      PORT: ${API_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://powerguard:powerguard@postgres:5432/powerguard?schema=public}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run prisma:generate && npm run prisma:push && npm run start:dev"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: powerguard-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
